# naive-agent. One web service + Postgres.
# Builds from the repo root so the npm workspaces resolve.

projects:
  - name: rkoron007-agents-workshop-naive
    environments:
      - name: production
        databases:
          - name: rkoron007-naive-agent-db
            plan: basic-256mb
            region: oregon
            postgresMajorVersion: "18"

        services:
          - type: web
            name: rkoron007-naive-agent
            runtime: node
            region: oregon
            plan: starter
            buildCommand: npm ci
            startCommand: npm run start --workspace @workshop/naive-agent
            healthCheckPath: /healthz
            envVars:
              - key: DATABASE_URL
                fromDatabase:
                  name: rkoron007-naive-agent-db
                  property: connectionString
              # Optional — without a key the agent uses a mock model.
              - key: ANTHROPIC_API_KEY
                sync: false
              - key: OPENAI_API_KEY
                sync: false
              - key: GITHUB_TOKEN
                sync: false
              - key: NODE_ENV
                value: production
